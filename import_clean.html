async function startImport(){
  var btn=document.getElementById('btn');
  var log=document.getElementById('log');
  btn.disabled=true;btn.textContent='Import en cours...';
  log.style.display='block';log.innerHTML='';
  try{
    log.innerHTML+='<span class="warn">Suppression de l'ancien inventaire...</span><br>';
    var existing=await db.collection('phones').get();
    for(var d of existing.docs) await db.collection('phones').doc(d.id).delete();
    log.innerHTML+='<span class="ok">✓ '+existing.size+' supprimés</span><br><br>';
    log.innerHTML+='<span class="warn">Import avec dateEntree: 2026-03-27...</span><br>';
    var success=0;
    for(var phone of phones){
      try{
        await db.collection('phones').add(phone);
        success++;
        var tag=phone.consigne?' ['+phone.consigne+']':'';
        log.innerHTML+='<span class="ok">✓</span> '+phone.brand+' '+phone.model+' '+phone.storage+tag+'<br>';
        log.scrollTop=log.scrollHeight;
      }catch(e){
        log.innerHTML+='<span class="err">✗ '+phone.brand+' '+phone.model+'</span><br>';
      }
    }
    log.innerHTML+='<br><strong class="ok">✓ '+success+' téléphones importés · dateEntree: 2026-03-27</strong>';
    btn.textContent='✓ Import réussi!';
  }catch(err){
    log.innerHTML+='<span class="err">Erreur: '+err.message+'</span>';
    btn.disabled=false;btn.textContent='Réessayer';

}
