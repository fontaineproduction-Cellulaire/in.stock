window.startImport = async function(){
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Import en cours...';
  log.style.display = 'block';
  log.innerHTML = '';

  // Delete existing phones
  log.innerHTML += '<span class="warn">Suppression de l\'ancien inventaire...</span><br>';
  const existing = await getDocs(collection(db,'phones'));
  for(const d of existing.docs) await deleteDoc(doc(db,'phones',d.id));
  log.innerHTML += `<span class="success">✓ ${existing.size} anciens téléphones supprimés</span><br><br>`;

  // Import new phones
  log.innerHTML += '<span class="warn">Import du nouvel inventaire...</span><br>';
  let success = 0;
  for(const phone of phones){
    try{
      await addDoc(collection(db,'phones'), phone);
      success++;
      const tag = phone.consigne ? ` [${phone.consigne}]` : '';
      log.innerHTML += `<span class="success">✓</span> ${phone.brand} ${phone.model} ${phone.storage}${tag}<br>`;
      log.scrollTop = log.scrollHeight;
    }catch(e){
      log.innerHTML += `<span class="error">✗ Erreur: ${phone.brand} ${phone.model}</span><br>`;
    }
  }

  log.innerHTML += `<br><strong class="success">✓ Import terminé! ${success} téléphones importés.</strong>`;
  btn.textContent = '✓ Import réussi!';
}
