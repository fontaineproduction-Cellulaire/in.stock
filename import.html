<style>

body{background:#f9fafb;font-family:'Segoe UI',system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.box{background:#fff;border-radius:16px;padding:40px 32px;max-width:480px;width:100%;border:1px solid #e5e7eb;text-align:center}

.btn{background:#1D9E75;color:#fff;border:none;padding:14px 32px;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;width:100%;transition:background 0.2s}
.btn:hover{background:#0F6E56}
.btn:disabled{background:#9ca3af;cursor:not-allowed}
.log{margin-top:20px;text-align:left;background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;font-size:12px;color:#374151;line-height:1.8;max-height:300px;overflow-y:auto;display:none}
.success{color:#1D9E75;font-weight:600}
.error{color:#A32D2D}
.count{font-size:32px;font-weight:700;color:#1D9E75;margin:16px 0 4px}
.count-label{font-size:13px;color:#6b7280;margin-bottom:24px}
</style>
</head>
<body>
<div class="box">

  <p>Cliquez le bouton pour importer tous vos téléphones d'un seul coup dans Firebase. Cette opération est sécuritaire — elle n'écrase pas les données existantes.</p>

  <div class="count-label">téléphones à importer</div>
  <button class="btn" id="btn" onclick="startImport()">Importer maintenant</button>

window.startImport = async function(){
  const btn = document.getElementById('btn');
  const log = document.getElementById('log');
  btn.disabled = true;
  btn.textContent = 'Import en cours...';
  log.style.display = 'block';
  log.innerHTML = '';

  // Check if already imported
  const existing = await getDocs(collection(db,'phones'));
  if(existing.size > 0){
    log.innerHTML = `<span class="error">⚠️ Il y a déjà ${existing.size} téléphone(s) dans Firebase. Supprime-les d'abord si tu veux réimporter.</span>`;
    btn.disabled = false;
    btn.textContent = 'Importer maintenant';
    return;
  }

  let success = 0;
  let errors = 0;

  for(const phone of phones){
    try{
      await addDoc(collection(db,'phones'), phone);
      success++;
      log.innerHTML += `<span class="success">✓</span> ${phone.brand} ${phone.model} ${phone.storage}${phone.consigne?' ['+phone.consigne+']':''}<br>`;
      log.scrollTop = log.scrollHeight;
    }catch(e){
      errors++;
      log.innerHTML += `<span class="error">✗ Erreur: ${phone.brand} ${phone.model}</span><br>`;
    }
  }

  log.innerHTML += `<br><strong class="success">Import terminé! ${success} téléphones importés${errors>0?' · '+errors+' erreurs':''}</strong>`;
  btn.textContent = success === phones.length ? '✓ Import réussi!' : 'Import partiel';
  document.getElementById('count').textContent = success;
}
</script>
